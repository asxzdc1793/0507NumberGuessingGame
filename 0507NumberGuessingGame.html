<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極密碼</title>
</head>
<body>
    <input type="number" id="num-input" min="1" max="100">
    <button class="btn">猜！</button>
    <button class="restart">重新開始</button>
    <div class="result-area">請猜 1 ~ 100 之間的數字<br></div>



    <script>

        let secretNumber = Math.floor(Math.random() * 100)+1;
        console.log(secretNumber);

        let minNum = 1;
        let maxNum = 100;
        const myInput = document.querySelector("#num-input");
        const myBtn = document.querySelector(".btn");
        const myRestart = document.querySelector(".restart");
        const resultArea = document.querySelector(".result-area");

        myBtn.addEventListener("click",function(){
            let guess = Number(myInput.value);
            if (myInput.value === "") {
            resultArea.innerHTML += `請輸入數字！<br>`;
            return;
            }
            if (!Number.isInteger(guess)) {
            resultArea.innerHTML += `請輸入整數！<br>`;
            return;
            }
            if (guess < minNum || guess > maxNum) {
            resultArea.innerHTML += `請猜 ${minNum} ~ ${maxNum} 之間的數字！<br>`;
            return;
            }
            



            if(guess > secretNumber){
                maxNum = guess - 1;
                myInput.max = maxNum;
                resultArea.innerHTML += `${guess} 太大了！請猜 ${minNum} ~ ${maxNum}<br>`;
            }else if (guess < secretNumber){
                minNum = guess + 1;
                myInput.min = minNum;
                resultArea.innerHTML += `${guess} 太小了！請猜 ${minNum} ~ ${maxNum}<br>`;
            }else{
                resultArea.innerHTML += `${guess} 猜對囉！<br>`;
                myInput.disabled = true;
                myBtn.disabled = true;
            }
            myInput.value = "";
        })

        myRestart.addEventListener("click",function(){
            myInput.disabled = false;
            myBtn.disabled = false;
            resultArea.innerHTML = "請猜 1 ~ 100 之間的數字<br>";
            myInput.value = "";
            minNum = 1;
            maxNum = 100;
            myInput.min = 1;
            myInput.max = 100;
            secretNumber = Math.floor(Math.random() * 100)+1;
            console.log(secretNumber);
        })
    </script>
</body>
</html>
