    <script>
        const pet = function(name){
            const petName = name;
            return function(){
                return petName;
            }
        };
        const myPet =pet("Mimi");
        console.log(myPet);//印出funtion的內容(宣告在pet內的)
        const res = myPet();
        console.log(res);

    // carrying 柯里化
    function add(a){
        return function(b){
            return a + b;
        }
    };
    console.log(add(8,9));
    const add10 = add(10);
    console.log(add10(5));
    console.log(add10(10));
