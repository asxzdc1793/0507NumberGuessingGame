<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<body>
    <script>
        console.log(Math.floor(3.8));//3
        console.log(Math.floor(-3.8));//-4
        console.log(Math.ceil(3.2));
        console.log(Math.round(3.5));
        
        
        console.log('-----');
        console.log((1.25).toFixed(1));
        console.log((1.35).toFixed(1));

        console.log('-----');

        console.log(Math.trunc(3.8));//3
        console.log(Math.trunc(-3.8));//-3
        console.log(Math.min(10, 3, 8));
        console.log(Math.max(10, 3, 8));
        console.log(Math.random()); // 0-1之間的小數
    </script>
</body>
</html>
