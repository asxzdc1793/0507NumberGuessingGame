<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color:rgb(18, 18, 40);
            color: white;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 32px;
        }
        .add-area{
            width: 360px;
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        #new-item{
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            flex: 1;
        }
        #add-btn{
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            
        }
        #add-btn:hover{
            background-color: rgb(104, 142, 246);
        }
        .list-header{
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            width: 360px;
            font-size: 1rem;
            border-bottom: 2px solid white;
            border-top: 2px solid  white ;
        }
        .list-header span:first-child{
            width: 18px;
        }
        .list-header span:nth-child(2){
            flex: 1;
        }
        .list-header span:nth-child(3){
            width: 46px;
            text-align: center;
        }
        ul{
            list-style: none;
            width: 360px;
            
        }
        li{
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 8px;
            border-bottom: 1px solid white;
        }
        li input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        li.checked span{
            text-decoration: line-through;
            color: red;
        }
        li span{
            flex: 1;
            font-size: 1.2rem;
        }
        
        li button{
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        li button:hover{
            background-color: rgb(104, 142, 246);
        }
    </Style>
</head>
<body>
    <main class="container">
        <h1 id="title">我的待辦清單</h1> 
        <div class="add-area">
            <input id="new-item" placeholder="新增項目..."/>
            <button id="add-btn">新增</button>
        </div>
        <div class="list-header">
            <span>檢核</span>
            <span>項目名稱</span>
            <span>移除</span>
        </div>
        <ul id="list"></ul> 
    </main>
    <script>
        // 資料來源：標題和待辦項目清單
        const data = {
            title: "我的待辦清單",
            list: [
                { id: 1, name: "項目一", checked: false }
                // { id: 2, name: "項目2", checked: true },
                // { id: 3, name: "項目3", checked: false },
                // { id: 4, name: "項目4", checked: false }
            ]
        };
        console.log(data);

        // 根據 data.list 重新產生畫面
        function render() {
            const ul = document.getElementById('list');
            ul.innerHTML = ''; // 先清空，避免重複疊加

            // 每筆資料建立一個 li
            data.list.forEach(item => {
                const li = document.createElement('li');
                if (item.checked) li.classList.add('checked');

                // 建立 checkbox，初始狀態對應資料的 checked
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = item.checked;

                // 建立顯示名稱的 span
                const span = document.createElement('span');
                span.textContent = item.name;

                // 勾選時更新資料並重新渲染
                checkbox.addEventListener('change', () => {
                    item.checked = checkbox.checked;
                    render();
                });

                // 建立刪除按鈕
                const delBtn = document.createElement('button');
                delBtn.textContent = '刪除';

                // 點刪除時，用 filter 移除該筆資料並重新渲染
                delBtn.addEventListener('click', () => {
                    data.list = data.list.filter(i => i.id !== item.id);
                    render();
                });

                // 把 checkbox、名稱、刪除按鈕都塞進 li，再加到 ul
                li.append(checkbox, span, delBtn);
                ul.append(li);
            });
        }

        render(); // 頁面載入時先渲染一次

        // 用來產生不重複的 id（從現有資料筆數 +1 開始）
        let nextId = data.list.length + 1;

        // 點新增按鈕時，把輸入框的值加入資料並重新渲染
        document.getElementById('add-btn').addEventListener('click', () => {
            const input = document.getElementById('new-item');
            const name = input.value.trim(); // trim() 去掉前後空白
            if (!name) return; // 空白就不新增
            data.list.push({ id: nextId++, name, checked: false });
            input.value = ''; // 清空輸入框
            render();
        });

    </script>
</body>
</html>
